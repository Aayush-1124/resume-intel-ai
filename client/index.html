<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeIntel AI | Editorial Precision</title>
  <meta name="description"
    content="AI-powered resume builder with ATS scoring, DOCX/PDF parsing, and 3 executive templates." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <!-- Prevent FOUC: apply saved theme before React hydrates -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('resumeintel_theme') || 'dark';
        document.documentElement.className = t;
      } catch (e) {
        document.documentElement.className = 'dark';
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
